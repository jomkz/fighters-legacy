name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          clang: 'true'

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-ubuntu-latest-${{ hashFiles('cmake/dependencies.cmake') }}

      - name: Configure
        run: cmake --preset asan
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build --preset asan

      - name: Configure OpenAL Soft null backend
        run: |
          mkdir -p "$HOME/.config"
          printf '[general]\ndrivers = null\n' > "$HOME/.config/alsoft.conf"

      - name: Test
        run: ctest --preset asan --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
