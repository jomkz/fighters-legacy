name: Coverage

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          vulkan: 'true'
          lcov: 'true'

      - name: Install gcovr
        run: pip install gcovr

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-coverage-ubuntu-latest-${{ hashFiles('cmake/dependencies.cmake') }}

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Configure OpenAL Soft null backend
        run: |
          mkdir -p "$HOME/.config"
          printf '[general]\ndrivers = null\n' > "$HOME/.config/alsoft.conf"

      - name: Test
        run: ctest --preset coverage --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture --directory . \
               --output-file coverage.raw \
               --branch-coverage \
               --ignore-errors empty,source,gcov,negative,mismatch

      - name: Filter coverage
        run: |
          lcov --remove coverage.raw \
               '/usr/*' \
               '*/tests/*' \
               '*/vendor/*' \
               '*/_deps/*' \
               '*/catch2/*' \
               '*/platform/*' \
               '*/tools/*' \
               '*/game/*' \
               --output-file coverage.info \
               --branch-coverage \
               --ignore-errors empty,unused,source,gcov

      - name: Generate HTML report
        run: |
          genhtml coverage.info \
                  --output-directory coverage-report \
                  --branch-coverage \
                  --legend \
                  --ignore-errors source \
                  --title "fighters-legacy coverage"

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30

      - name: Enforce branch coverage gate — engine/ >= 80%
        run: |
          gcovr \
            --filter 'engine/' \
            --gcov-exclude '.*/_deps/.*' \
            --gcov-ignore-errors all \
            --gcov-ignore-parse-errors suspicious_hits.warn_once_per_file \
            --exclude-throw-branches \
            --fail-under-branch 80 \
            --print-summary

      - name: Enforce line coverage gate — engine/ >= 70%
        run: |
          gcovr \
            --filter 'engine/' \
            --gcov-exclude '.*/_deps/.*' \
            --gcov-ignore-errors all \
            --gcov-ignore-parse-errors suspicious_hits.warn_once_per_file \
            --exclude-throw-branches \
            --fail-under-line 70 \
            --print-summary

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
