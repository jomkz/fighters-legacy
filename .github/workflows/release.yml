name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: release-msvc
            artifact: fighters-legacy-windows
          - os: ubuntu-latest
            preset: release
            artifact: fighters-legacy-linux
          - os: macos-latest
            preset: release
            artifact: fighters-legacy-macos

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake gcc g++ clang \
            libvulkan-dev glslang-tools \
            libx11-dev libxext-dev \
            libopenal-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: '1.3.290.0'
          cache: true

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja vulkan-headers molten-vk vulkan-loader glslang

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package
        run: echo "Packaging placeholder — update as build targets are defined in Phase 1"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: "**/*.zip"
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Fallback release notes
        id: notes
        run: |
          body="${{ steps.cliff.outputs.content }}"
          if [ -z "${body// }" ]; then
            body="Infrastructure and CI improvements — no user-facing changes."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        id: release
        with:
          body: ${{ steps.notes.outputs.body }}
          files: "**/*.zip"

      - name: Attest build provenance
        if: hashFiles('**/*.zip') != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "**/*.zip"
