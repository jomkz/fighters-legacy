name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: release-msvc
            artifact: fighters-legacy-windows
          - os: ubuntu-latest
            preset: release
            artifact: fighters-legacy-linux
          - os: macos-latest
            preset: release
            artifact: fighters-legacy-macos

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libvulkan-dev libsdl3-dev libopenal-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package
        run: echo "Packaging placeholder — update as build targets are defined in Phase 1"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: "**/*.zip"
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        id: release
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: "**/*.zip"

      - name: Attest build provenance
        if: hashFiles('**/*.zip') != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "**/*.zip"
