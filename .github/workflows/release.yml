name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: release-msvc
            artifact: fighters-legacy-windows
          - os: ubuntu-latest
            preset: release
            artifact: fighters-legacy-linux
          - os: macos-latest
            preset: release
            artifact: fighters-legacy-macos

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/install-linux-deps
        with:
          gcc: 'true'
          clang: 'true'
          vulkan: 'true'

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: '1.3.290.0'
          cache: true

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja vulkan-headers molten-vk vulkan-loader glslang

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-v2-${{ matrix.os }}-${{ hashFiles('cmake/dependencies.cmake') }}

      - name: Set up MSVC developer environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/shaders
          cp build/${{ matrix.preset }}/game/fighters-legacy/fighters-legacy dist/ 2>/dev/null || true
          for tool in validate-flight-model validate-mission validate-mesh tex-compress validate-licenses; do
            cp build/${{ matrix.preset }}/tools/$tool dist/ 2>/dev/null || true
          done
          cp build/${{ matrix.preset }}/platform/vulkan/shaders/*.spv dist/shaders/ 2>/dev/null || true
          cd dist && zip -r ../${{ matrix.artifact }}.zip .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force dist\shaders | Out-Null
          $tools = @("validate-flight-model","validate-mission","validate-mesh","tex-compress","validate-licenses","validate-playlist")
          foreach ($t in $tools) {
            $src = "build\${{ matrix.preset }}\tools\$t.exe"
            if (Test-Path $src) { Copy-Item $src dist\ }
          }
          $game = "build\${{ matrix.preset }}\game\fighters-legacy\fighters-legacy.exe"
          if (Test-Path $game) { Copy-Item $game dist\ }
          $spvDir = "build\${{ matrix.preset }}\platform\vulkan\shaders"
          if (Test-Path $spvDir) { Copy-Item "$spvDir\*.spv" dist\shaders\ }
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: "dist/*.zip"
          if-no-files-found: ignore
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Fallback release notes
        id: notes
        run: |
          body="${{ steps.cliff.outputs.content }}"
          if [ -z "${body// }" ]; then
            body="Infrastructure and CI improvements — no user-facing changes."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        id: release
        with:
          body: ${{ steps.notes.outputs.body }}
          files: "dist/*.zip"

      - name: Attest build provenance
        if: hashFiles('**/*.zip') != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.zip"
