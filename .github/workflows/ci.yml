name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: debug-msvc
          - os: ubuntu-latest
            preset: debug
          - os: macos-latest
            preset: debug

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake gcc g++ clang clang-format-22 \
            libvulkan-dev glslang-tools \
            libx11-dev libxext-dev \
            libopenal-dev \
            python3-gdal python3-numpy python3-pytest

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja vulkan-headers molten-vk vulkan-loader glslang

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: '1.3.290.0'
          cache: true

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: cmake-deps-${{ matrix.os }}-${{ matrix.preset }}-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: cmake-deps-${{ matrix.os }}-${{ matrix.preset }}-

      - name: REUSE compliance check
        if: matrix.os == 'ubuntu-latest'
        uses: fsfe/reuse-action@v4

      - name: Check clang-format
        if: matrix.os == 'ubuntu-latest'
        run: |
          git diff --name-only --diff-filter=d origin/${{ github.base_ref || 'main' }}...HEAD \
            | grep -E '\.(cpp|h|hpp|c)$' \
            | xargs -r clang-format-22 --dry-run --Werror

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Add Windows DLL directories to PATH
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "$PWD\build\debug-msvc\_deps\sdl3-build\Debug" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$PWD\build\debug-msvc\_deps\openal-soft-build\Debug" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$PWD\build\debug-msvc\Debug" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Smoke test fighters-legacy --version (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: ./build/debug/game/fighters-legacy/fighters-legacy --version

      - name: Smoke test fighters-legacy --version (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\debug-msvc\game\fighters-legacy\Debug\fighters-legacy.exe --version
        shell: pwsh

      - name: Smoke test fl-server --version (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: ./build/debug/server/fl-server/fl-server --version

      - name: Smoke test fl-server --version (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\debug-msvc\server\fl-server\Debug\fl-server.exe --version
        shell: pwsh

      - name: Smoke test asset pipeline tools (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          ./build/debug/tools/validate-flight-model --version
          ./build/debug/tools/validate-mission --version
          ./build/debug/tools/validate-mesh --version
          ./build/debug/tools/tex-compress --version
          ./build/debug/tools/validate-licenses --version
          ./build/debug/tools/validate-playlist --version
          ./build/debug/tools/terrain-chunk-io --version

      - name: Smoke test asset pipeline tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .\build\debug-msvc\tools\Debug\validate-flight-model.exe --version
          .\build\debug-msvc\tools\Debug\validate-mission.exe --version
          .\build\debug-msvc\tools\Debug\validate-mesh.exe --version
          .\build\debug-msvc\tools\Debug\tex-compress.exe --version
          .\build\debug-msvc\tools\Debug\validate-licenses.exe --version
          .\build\debug-msvc\tools\Debug\validate-playlist.exe --version
          .\build\debug-msvc\tools\Debug\terrain-chunk-io.exe --version
        shell: pwsh

      - name: Configure OpenAL Soft null backend
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p "$HOME/.config"
          printf '[general]\ndrivers = null\n' > "$HOME/.config/alsoft.conf"

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Unit test gen_terrain_chunks.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: python3 -m pytest tests/test_gen_terrain_chunks.py -v

      - name: Smoke test terrain-chunk-io gen-procedural (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./build/debug/tools/terrain-chunk-io gen-procedural \
            --cx 0 --cy 0 --output /tmp/builtin_chunk.u16

          python3 - <<'EOF'
          import struct
          with open("/tmp/builtin_chunk.u16", "rb") as f:
              magic, w, h = struct.unpack("<IHH", f.read(8))
          assert magic == 0x464C4348, f"wrong magic: {magic:#x}"
          assert w == 513 and h == 513, f"wrong size: {w}x{h}"
          print(f"OK: terrain-chunk-io gen-procedural output valid ({w}x{h}, magic {magic:#x})")
          EOF

      - name: Smoke test gen_terrain_chunks.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 tools/gen_terrain_chunks.py --help

          python3 - <<'EOF'
          from osgeo import gdal, osr
          import numpy as np
          ds = gdal.GetDriverByName("GTiff").Create(
              "/tmp/test_dem.tif", 256, 256, 1, gdal.GDT_Int16)
          srs = osr.SpatialReference()
          srs.ImportFromEPSG(4326)
          ds.SetProjection(srs.ExportToWkt())
          ds.SetGeoTransform([30.0, 30.0 / 111111.0, 0, 42.0, 0, -30.0 / 111111.0])
          ds.GetRasterBand(1).WriteArray(
              np.random.randint(0, 500, (256, 256), dtype=np.int16))
          ds.FlushCache()
          EOF

          python3 tools/gen_terrain_chunks.py \
            --input /tmp/test_dem.tif \
            --terrain-id world \
            --chunk-size-m 15360 \
            --grid-width 1 --grid-height 1 \
            --srs EPSG:32637 \
            --workers 1 \
            --output-dir /tmp/terrain-out \
            --write-manifest

          python3 - <<'EOF'
          from osgeo import gdal
          import json, sys
          for lod, (w, h) in enumerate([(513, 513), (257, 257), (129, 129)]):
              ds = gdal.Open(f"/tmp/terrain-out/terrain/world/lod{lod}/chunk_0000_0000.png")
              assert ds is not None, f"lod{lod} chunk missing"
              assert ds.RasterXSize == w and ds.RasterYSize == h, \
                  f"lod{lod}: expected {w}x{h}, got {ds.RasterXSize}x{ds.RasterYSize}"
              assert ds.GetRasterBand(1).DataType == 2, \
                  f"lod{lod}: expected GDT_UInt16 (2), got {ds.GetRasterBand(1).DataType}"
          m = json.load(open("/tmp/terrain-out/terrain/world.json"))
          assert m["chunk_size_m"] == 15360
          assert m["grid_width"] == 1 and m["grid_height"] == 1
          assert m["lod_levels"] == 3
          print("OK: all chunk sizes, dtypes, and manifest fields correct")
          EOF
