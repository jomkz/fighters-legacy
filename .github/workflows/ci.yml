name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          clang_format: 'true'

      - name: REUSE compliance check
        uses: fsfe/reuse-action@v4

      - name: Check clang-format
        run: |
          git diff --name-only --diff-filter=d origin/${{ github.base_ref || 'main' }}...HEAD \
            | grep -E '\.(cpp|h|hpp|c)$' \
            | xargs -r clang-format-22 --dry-run --Werror

  build:
    needs: [lint]
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: debug-msvc
          - os: ubuntu-latest
            preset: debug
          - os: macos-latest
            preset: debug

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/install-linux-deps
        with:
          vulkan: 'true'
          gcc: 'true'
          python_tools: 'true'

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja vulkan-headers molten-vk vulkan-loader glslang

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: '1.3.290.0'
          cache: true

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-v2-${{ matrix.os }}-${{ hashFiles('cmake/dependencies.cmake') }}

      - name: Set up MSVC developer environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Smoke test fighters-legacy --version (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: ./build/debug/game/fighters-legacy/fighters-legacy --version

      - name: Smoke test fighters-legacy --version (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\debug-msvc\game\fighters-legacy\fighters-legacy.exe --version
        shell: pwsh

      - name: Smoke test fl-server --version (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: ./build/debug/server/fl-server/fl-server --version

      - name: Smoke test fl-server --version (Windows)
        if: matrix.os == 'windows-latest'
        run: .\build\debug-msvc\server\fl-server\fl-server.exe --version
        shell: pwsh

      - name: Smoke test tools (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          ./build/debug/tools/validate-flight-model --version
          ./build/debug/tools/validate-mission --version
          ./build/debug/tools/validate-mesh --version
          # The builtin reference meshes (docs/modding/3d-models.md) must validate with zero
          # warnings or errors — clean validation prints nothing, so fail on any output.
          python3 tools/gen_builtin_glb.py --export-dir /tmp/builtin-meshes
          mesh_out=$(./build/debug/tools/validate-mesh /tmp/builtin-meshes/builtin_entity.glb /tmp/builtin-meshes/builtin_floor.glb 2>&1)
          if [ -n "$mesh_out" ]; then echo "builtin reference meshes failed validation:"; echo "$mesh_out"; exit 1; fi
          ./build/debug/tools/tex-compress --version
          ./build/debug/tools/validate-licenses --version
          ./build/debug/tools/validate-playlist --version
          ./build/debug/tools/terrain-chunk-io --version
          ./build/debug/server/fl-server/fl-server 7002 1 &
          FL_SERVER_PID=$!
          # Wait up to 10 s for the server to finish startup (primeSpawnHeight can block up to
          # 5 s on first run with no cached terrain chunks, e.g. in CI without content packs).
          sleep 10
          ./build/debug/tools/net_check 127.0.0.1 7002 --count 3 --interval 100
          ./build/debug/tools/net_check 127.0.0.1 7002 --bench 30 --bench-rate 60
          status=$?
          kill "$FL_SERVER_PID" 2>/dev/null || true
          exit $status

      - name: Smoke test asset pipeline tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .\build\debug-msvc\tools\validate-flight-model.exe --version
          .\build\debug-msvc\tools\validate-mission.exe --version
          .\build\debug-msvc\tools\validate-mesh.exe --version
          .\build\debug-msvc\tools\tex-compress.exe --version
          .\build\debug-msvc\tools\validate-licenses.exe --version
          .\build\debug-msvc\tools\validate-playlist.exe --version
          .\build\debug-msvc\tools\terrain-chunk-io.exe --version
        shell: pwsh

      - name: Verify static linking (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bad=$(ldd build/debug/game/fighters-legacy/fighters-legacy \
                | grep -Ei "sdl3|openal|ktx" || true)
          [ -z "$bad" ] || (echo "Unexpected dynamic deps: $bad" && exit 1)

      - name: Configure OpenAL Soft null backend
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p "$HOME/.config"
          printf '[general]\ndrivers = null\n' > "$HOME/.config/alsoft.conf"

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Unit test gen_terrain_chunks.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: python3 -m pytest tests/test_gen_terrain_chunks.py -v

      - name: Unit test gen_unifont_header.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: python3 -m pytest tests/test_gen_unifont_header.py -v

      - name: Unit test latency_analysis/compare.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: python3 -m pytest tests/test_latency_compare.py -v

      - name: Smoke test gen_unifont_header.py --help (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: python3 tools/gen_unifont_header.py --help

      - name: Smoke test terrain-chunk-io gen-procedural (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./build/debug/tools/terrain-chunk-io gen-procedural \
            --cx 0 --cy 0 --output /tmp/builtin_chunk.u16

          python3 - <<'EOF'
          import struct
          with open("/tmp/builtin_chunk.u16", "rb") as f:
              magic, w, h = struct.unpack("<IHH", f.read(8))
          assert magic == 0x464C4348, f"wrong magic: {magic:#x}"
          assert w == 513 and h == 513, f"wrong size: {w}x{h}"
          print(f"OK: terrain-chunk-io gen-procedural output valid ({w}x{h}, magic {magic:#x})")
          EOF

      - name: Smoke test gen_terrain_chunks.py (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 tools/gen_terrain_chunks.py --help

          python3 - <<'EOF'
          from osgeo import gdal, osr
          import numpy as np
          ds = gdal.GetDriverByName("GTiff").Create(
              "/tmp/test_dem.tif", 256, 256, 1, gdal.GDT_Int16)
          srs = osr.SpatialReference()
          srs.ImportFromEPSG(4326)
          ds.SetProjection(srs.ExportToWkt())
          ds.SetGeoTransform([30.0, 30.0 / 111111.0, 0, 42.0, 0, -30.0 / 111111.0])
          ds.GetRasterBand(1).WriteArray(
              np.random.randint(0, 500, (256, 256), dtype=np.int16))
          ds.FlushCache()
          EOF

          python3 tools/gen_terrain_chunks.py \
            --input /tmp/test_dem.tif \
            --terrain-id world \
            --chunk-size-m 15360 \
            --grid-width 1 --grid-height 1 \
            --srs EPSG:32637 \
            --workers 1 \
            --output-dir /tmp/terrain-out \
            --write-manifest

          python3 - <<'EOF'
          from osgeo import gdal
          import json, sys
          for lod, (w, h) in enumerate([(513, 513), (257, 257), (129, 129)]):
              ds = gdal.Open(f"/tmp/terrain-out/terrain/world/lod{lod}/chunk_0000_0000.png")
              assert ds is not None, f"lod{lod} chunk missing"
              assert ds.RasterXSize == w and ds.RasterYSize == h, \
                  f"lod{lod}: expected {w}x{h}, got {ds.RasterXSize}x{ds.RasterYSize}"
              assert ds.GetRasterBand(1).DataType == 2, \
                  f"lod{lod}: expected GDT_UInt16 (2), got {ds.GetRasterBand(1).DataType}"
          m = json.load(open("/tmp/terrain-out/terrain/world.json"))
          assert m["chunk_size_m"] == 15360
          assert m["grid_width"] == 1 and m["grid_height"] == 1
          assert m["lod_levels"] == 3
          print("OK: all chunk sizes, dtypes, and manifest fields correct")
          EOF
