name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 10
        - Windows 11
        - Linux
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - engine / HAL
        - renderer (Vulkan)
        - audio (OpenAL)
        - network (ENet)
        - content system
        - flight model
        - ai system
        - mission / campaign
        - build system
        - unsure / multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch fighters-legacy with ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 22H2
        - fighters-legacy version: v0.1.0
        - GPU: NVIDIA RTX 3070 (driver 555.00)
        - CPU: Intel Core i7-12700K
